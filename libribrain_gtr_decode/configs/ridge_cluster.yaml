project:
  seed: 0
  output_dir: /path/to/outputs/libribrain_gtr_decode
  cache_dir: /path/to/outputs/libribrain_gtr_decode/cache

data:
  pnpl_root: /path/to/pnpl_or_checkout
  libribrain_root: /path/to/libribrain
  subject: null
  sessions: null
  runs: null
  mock_data: false

windows:
  text_window_sec: 10.0
  sample_interval_sec: 1.0
  min_words: 3
  meg_tmin_sec: -10.0
  meg_tmax_sec: 1.0

features:
  meg_downsample_hz: 50
  standardize_channels: true
  use_all_channels: true
  pca_components: 1024
  pca_batch_size: 2048
  meg_batch_size: 512

embeddings:
  model_name: sentence-transformers/gtr-t5-base
  batch_size: 64
  normalize: true
  mock: false
  mock_dim: 768

split:
  method: by_run
  train_fraction: 0.8
  val_fraction: 0.1
  test_fraction: 0.1
  seed: 0

ridge:
  alphas: [0.1, 1, 10, 100, 1000, 10000]
  selection_metric: val_mrr_same_run_or_batch
  normalize_predictions: true
  controls: [time_shift, shuffled_labels]
  time_shift_sec: 60.0

evaluation:
  n_random_distractors: 999
  relaxed_tolerance_sec: 10.0
  relaxed_tolerances_sec: [5.0, 10.0]
  evaluate_global_random: true
  evaluate_same_run: true
  evaluate_nearby: true
  nearby_min_sec: 30
  nearby_max_sec: 300

debug:
  enabled: false
  max_runs: 1
  max_examples: 2000
