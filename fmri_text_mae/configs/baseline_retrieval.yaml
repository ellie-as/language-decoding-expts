data:
  train_npz: fmri_text_mae/outputs/windows/S1/train_windows.npz
  val_npz: fmri_text_mae/outputs/windows/S1/val_windows.npz
  test_npz: fmri_text_mae/outputs/windows/S1/test_windows.npz
  output_dir: fmri_text_mae/outputs/retrieval/S1

text:
  embedding_model: sentence-transformers/all-mpnet-base-v2
  embedding_batch_size: 64

model:
  kind: ridge
  ridge_alpha: 100.0
  mlp_hidden_dim: 1024
  mlp_epochs: 50
  mlp_batch_size: 64
  mlp_lr: 0.0003
  mlp_weight_decay: 0.0001

evaluation:
  candidate_pool: test
  n_distractors: 0
  random_seed: 42
  shuffled_baseline: true
