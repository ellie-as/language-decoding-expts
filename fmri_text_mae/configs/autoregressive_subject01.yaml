data:
  train_npz: fmri_text_mae/outputs/windows/S1/train_windows.npz
  val_npz: fmri_text_mae/outputs/windows/S1/val_windows.npz
  test_npz: fmri_text_mae/outputs/windows/S1/test_windows.npz
  output_dir: fmri_text_mae/outputs/prefix_gpt/S1

text:
  decoder_model: gpt2
  max_text_tokens: 64

model:
  n_prefix_tokens: 16
  brain_encoder_d_model: 512
  brain_encoder_layers: 4
  brain_encoder_heads: 8
  dropout: 0.1
  freeze_gpt: true

training:
  batch_size: 16
  lr: 0.0001
  weight_decay: 0.0001
  epochs: 30
  random_seed: 42
